<div class="col-md-6 col-lg-4 asset-col" data-asset-id="{{ asset.id }}">
    <div class="card asset-card h-100"
         data-name="{{ asset.name }}"
         data-asset-type="{{ asset.asset_type }}"
         data-location="{{ asset.location }}"
         data-last-test-date="{{ asset.last_test_date }}"
         data-next-due-date="{{ asset.next_due_date }}"
         data-notes="{{ asset.notes }}">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <span class="badge {{ 'badge-ai' if asset.source == 'AI-Extracted' else 'badge-manual' }}">
                    <i class="bi {{ 'bi-robot' if asset.source == 'AI-Extracted' else 'bi-person' }}"></i> {{ asset.source }}
                </span>
                {% if asset.next_due_date %}<span class="badge text-bg-light border"><i class="bi bi-calendar-event"></i> Due {{ asset.next_due_date }}</span>{% endif %}
            </div>
            <h5 class="card-title tag-id mt-2 mb-1">{{ asset.name }}</h5>
            <p class="text-muted small mb-2">{{ asset.asset_type }}{% if asset.location %} &middot; {{ asset.location }}{% endif %}</p>
            <div class="sensor-detail-row"><span class="label">Last Test Date</span><span class="value">{{ asset.last_test_date or "—" }}</span></div>
            <div class="sensor-detail-row"><span class="label">Next Due Date</span><span class="value">{{ asset.next_due_date or "—" }}</span></div>
        </div>
        <div class="card-footer bg-transparent d-flex gap-2">
            <button type="button" class="btn btn-sm btn-outline-primary flex-grow-1 edit-asset-btn"><i class="bi bi-pencil"></i> Edit</button>
            <button type="button" class="btn btn-sm btn-outline-danger flex-grow-1 delete-asset-btn"><i class="bi bi-trash"></i> Delete</button>
        </div>
    </div>
</div>

<div class="modal fade" id="contractorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="contractorModalTitle">Add Contractor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="contractorForm">
                    <input type="hidden" id="contractorId" value="">
                    <div class="mb-3">
                        <label class="form-label">Contractor Name</label>
                        <input type="text" class="form-control" id="contractorName" required placeholder="e.g. VibroTech Services">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Scope of Work</label>
                        <input type="text" class="form-control" id="contractorScopeOfWork">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Joint Safety Review / HAZOP Conducted?</label>
                            <select class="form-select" id="contractorJointHazop">
                                <option value="">— Select —</option>
                                <option value="Y">Y</option>
                                <option value="N">N</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Last Joint Inspection Date</label>
                            <input type="text" class="form-control" id="contractorLastInspection">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Safety Induction Completed?</label>
                            <select class="form-select" id="contractorSafetyInduction">
                                <option value="">— Select —</option>
                                <option value="Y">Y</option>
                                <option value="N">N</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Supervising Employee</label>
                            <select class="form-select" id="contractorSupervisingEmployee">
                                <option value="">— None —</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" id="contractorPhone">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="contractorEmail">
                        </div>
                    </div>
                    <div class="mb-1">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" id="contractorNotes" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveContractorBtn"><i class="bi bi-check-lg"></i> Save</button>
            </div>
        </div>
    </div>
</div>

<!--
    A single modal reused for BOTH "Add New Sensor/System" and "Edit
    Sensor". static/js/sensors.js decides which mode it's in based on
    whether a sensor_id is present in the hidden #sensorId field:
      - empty  -> Add mode  -> POST /factory/<id>/sensors/add
      - filled -> Edit mode -> POST /factory/<id>/sensors/<sensor_id>/edit
-->
<div class="modal fade" id="sensorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="sensorModalTitle">Add New Sensor/System</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="sensorForm">
                    <input type="hidden" id="sensorId" value="">

                    <div class="mb-3">
                        <label class="form-label">Sensor / System Name</label>
                        <input type="text" class="form-control" id="sensorName" required
                               placeholder="e.g. Furnace Pressure Transmitter — FPT-101">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Type</label>
                            <select class="form-select" id="sensorType" required></select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Response Type</label>
                            <select class="form-select" id="responseType" required></select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control" id="sensorLocation"
                               placeholder="e.g. Boiler Unit 1 - Furnace">
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Unit</label>
                            <input type="text" class="form-control" id="sensorUnit" placeholder="e.g. °C, bar, ppm">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Normal Range</label>
                            <input type="text" class="form-control" id="normalRange" placeholder="e.g. 20 - 45">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Alarm Threshold</label>
                            <input type="text" class="form-control" id="alarmThreshold" placeholder="e.g. > 50">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" id="sensorNotes" rows="2"
                                  placeholder="Optional — anything else worth capturing about this sensor"></textarea>
                    </div>

                    <hr>
                    <h6 class="text-muted mb-2"><i class="bi bi-hdd-network"></i> Live Data API (optional)</h6>
                    <p class="small text-muted">
                        If sensor readings are available via a JSON API, configure it here. You can test
                        the connection from the sensor card after saving.
                    </p>

                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">API URL</label>
                            <input type="text" class="form-control" id="apiUrl"
                                   placeholder="https://plant-scada.example.com/api/sensors/FPT-101">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Method</label>
                            <select class="form-select" id="apiMethod"></select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Headers (one "Key: Value" per line, optional)</label>
                        <textarea class="form-control" id="apiHeaders" rows="2"
                                  placeholder="Authorization: Bearer your-token-here"></textarea>
                    </div>

                    <div class="mb-1">
                        <label class="form-label">JSON Path to Reading (optional)</label>
                        <input type="text" class="form-control" id="apiJsonPath" placeholder="e.g. data.value">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveSensorBtn">
                    <i class="bi bi-check-lg"></i> Save
                </button>
            </div>
        </div>
    </div>
</div>

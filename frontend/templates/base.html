<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Factory Safety Intelligence{% endblock %}</title>

    <!-- Bootstrap 5 (CSS framework) + Bootstrap Icons, via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts: Inter (UI text) + JetBrains Mono (technical tag IDs --
         sensor tags, permit numbers, asset IDs -- styled to look like real
         SCADA/HMI tag naming conventions, see .tag-id in style.css) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <!-- Custom styles (loaded after Bootstrap so overrides apply) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg app-navbar">
        <div class="container-fluid px-3 px-md-4">
            <a class="navbar-brand" href="{{ url_for('main.landing') }}">
                <i class="bi bi-shield-check"></i> Compound Risk Intelligence
            </a>
        </div>
    </nav>

   <main class="app-main">
        {% block main_layout %}
        <div class="container-fluid app-content-wrap px-3 px-md-4">
            {% include "partials/flash_messages.html" %}
            {% block content %}{% endblock %}
        </div>
        {% endblock %}
    </main>

    <!-- Bootstrap JS bundle (includes Popper, needed for modals) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
